# Опційно: публікація через GitHub Actions (якщо у Settings → Pages обрано Source: GitHub Actions).
# Якщо на сайті немає «GitHub Actions» — використовуйте гілку main + папку /docs (див. scripts/github-pages-miniapp.txt).

name: GitHub Pages — ZV Mini App

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-zv-miniapp
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Зібрати статичний сайт
        run: |
          mkdir -p _site
          cp webapp/zv_dorm_form.html _site/
          touch _site/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
