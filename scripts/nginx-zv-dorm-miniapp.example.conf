# Приклад віртуального хоста для Mini App «Зв з гуртожитку».
# Домен: c55scheluderzv.gamer.gd → проксі на локальний http.server з каталогу webapp (порт 2255).
#
# Якщо сайт і домен підключені на InfinityFree (dash.infinityfree.com) —
# nginx на VPS для цього домену НЕ потрібен: завантажте webapp/zv_dorm_form.html
# у File Manager InfinityFree і в .env вкажіть повний HTTPS-URL до файлу.
# Детальніше: scripts/miniapp-host-infinityfree.txt
#
# Перед підключенням (варіант «DNS вказує на VPS»):
# 1) DNS у панелі gamer.gd: тип A, ім’я c55scheluderzv, значення — публічна IPv4 вашого VPS.
# 2) На сервері: sudo apt install -y nginx certbot python3-certbot-nginx
# 3) Скопіюйте цей файл: sudo cp scripts/nginx-zv-dorm-miniapp.example.conf /etc/nginx/sites-available/c55-zv-miniapp
#    sudo ln -sf /etc/nginx/sites-available/c55-zv-miniapp /etc/nginx/sites-enabled/
# 4) Перевірка: sudo nginx -t && sudo systemctl reload nginx
# 5) TLS: sudo certbot --nginx -d c55scheluderzv.gamer.gd
# 6) У .env: ZV_DORM_WEBAPP_URL=https://c55scheluderzv.gamer.gd/zv_dorm_form.html
# 7) Має працювати screen zv_webapp (python3 -m http.server 2255 у webapp/).
# 8) У @BotFather для бота додайте домен / Menu Button Web App — згідно підказок клієнта для вашого хоста.
#
# Порти 80/443 мають бути відкриті (ufw/iptables).

server {
    listen 80;
    listen [::]:80;
    server_name c55scheluderzv.gamer.gd;

    location / {
        proxy_pass http://127.0.0.1:2255/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
